name: deploy-dashboard

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "spec-driven-development/exec/state.md"
      - "spec-driven-development/cli/state_builder.py"
      - ".github/workflows/deploy-dashboard.yml"
      - "Dockerfile"

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: ca24921a026cacr
  IMAGE_NAME: state-dashboard
  CONTAINER_APP: state-dashboard
  RESOURCE_GROUP: rg-bridge-dashboard

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC, no secrets stored)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Update Container App revision
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
