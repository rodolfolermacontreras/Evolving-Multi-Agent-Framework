name: doctor

# Validation-only CI for the SDD framework. Explicit CI mode runs every
# source-controlled doctor check while reporting ignored clone-local ledger
# checks as inapplicable. It only reads the repository and reports pass/fail --
# no cloud login, credentials, or production mutation. See ADR-025.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run doctor
        run: python spec-driven-development/cli/bootstrap.py doctor --mode ci
